<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منتج — CurateGreen مراكش</title>
  <meta name="description" content="اطلب منتجات طازجة من كيوريت غرين في مراكش. توصيل سريع عبر واتساب.">
  <link rel="canonical" href="https://curategreen.com/product.html">
  <meta name="theme-color" content="#5C6B3D">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Fraunces:ital,wght@0,700;1,500&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
  .search-dropdown{position:absolute;top:calc(100%+8px);inset-inline-start:0;inset-inline-end:0;background:var(--color-white);border:1px solid var(--color-line);border-radius:6px;box-shadow:0 12px 30px -10px rgba(0,0,0,.2);z-index:300;max-height:320px;overflow-y:auto}
  .search-result-item a{display:flex;align-items:center;gap:.8rem;padding:.6rem 1rem;border-bottom:1px solid var(--color-line)}
  .search-result-item a:hover{background:var(--color-cream)}
  .search-result-item img{width:40px;height:40px;object-fit:cover;border-radius:4px}
  .search-result-item strong{display:block;font-size:.9rem;color:var(--color-ink)}
  .search-result-item span{font-size:.78rem;color:var(--color-ink-soft)}
  .search-icon{width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:1.4rem}
  .search-empty{padding:1rem;color:var(--color-ink-soft);text-align:center;font-size:.9rem}
  </style>

  <!-- Product Schema (updated dynamically via JS) -->
  <script id="product-schema" type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Product",
    "name": "منتج طازج",
    "brand": { "@type": "Brand", "name": "CurateGreen" },
    "offers": {
      "@type": "Offer",
      "priceCurrency": "MAD",
      "availability": "https://schema.org/InStock",
      "seller": { "@type": "Organization", "name": "CurateGreen" }
    }
  }
  </script>
</head>
<body>
<div id="site-header-placeholder"></div>

<main id="main-content">

  <div class="page-head" style="padding-bottom:var(--space-2);">
    <div class="wrap">
      <nav class="breadcrumbs" aria-label="breadcrumb">
        <a href="index.html"    data-i18n="nav_home">الرئيسية</a>
        <span class="sep">›</span>
        <a href="products.html" data-i18n="nav_products">المنتجات</a>
        <span class="sep">›</span>
        <span id="bc-product">—</span>
      </nav>
    </div>
  </div>

  <section class="section-tight">
    <div class="wrap">
      <div id="product-root">
        <!-- Rendered by app.js initProductPage() -->
        <div style="text-align:center;padding:var(--space-5) 0;color:var(--color-ink-soft);">
          جارٍ التحميل…
        </div>
      </div>
    </div>
  </section>

  <!-- Related products -->
  <section class="section" style="background:var(--color-cream-deep);">
    <div class="wrap">
      <h2 style="margin-bottom:var(--space-3);" data-i18n="lbl_related">منتجات مشابهة</h2>
      <div class="grid grid-4" id="related-grid"></div>
    </div>
  </section>

</main>

<div id="site-footer-placeholder"></div>
<script src="assets/js/categories.js"></script>
<script src="assets/js/products.js"></script>
<script src="assets/js/services.js"></script>
<script src="assets/js/translations.js"></script>
<script src="assets/js/search.js"></script>
<script src="assets/js/app.js"></script>

<script>
/* Update breadcrumb and schema after product loads */
document.addEventListener("DOMContentLoaded", () => {
  const id = new URLSearchParams(location.search).get("id");
  const p  = (typeof CG_PRODUCTS !== "undefined") && CG_PRODUCTS.find(x => x.id === id);
  if (!p) return;
  const bc = document.getElementById("bc-product");
  if (bc) bc.textContent = CG_I18N.t(p.nameKey);

  /* Patch schema */
  const schema = document.getElementById("product-schema");
  if (schema) {
    const s = JSON.parse(schema.textContent);
    s.name  = CG_I18N.t(p.nameKey);
    s.description = CG_I18N.t(p.descKey);
    s.image = p.image;
    s.offers.price = p.basePrice;
    schema.textContent = JSON.stringify(s);
  }
});
</script>
</body>
</html>
